#    - "{{ pools.btrfs }}"
#- debug: msg={{ delete_partition }}


- name: Clean Devices
  shell: |
    dd if=/dev/zero of={{ item.source }} bs=1M count=1
    partprobe {{ item.source }}
  register: clean_devices
  ignore_errors: true
  with_items:
    - "{{ pools.btrfs }}"
- debug: msg={{ clean_devices }}


