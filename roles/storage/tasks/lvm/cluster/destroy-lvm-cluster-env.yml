- name: Disable LVM Cluster Lock
  replace:
    path: "{{ item.dest }}"
    regexp: "{{ item.regexp }}"
    replace: "{{ item.line }}"
  register: disable_lvm_cluster_lock
  with_items:
    - { regexp: "use_lvmlockd = 1",          line: "# use_lvmlockd = 0",    dest: "/etc/lvm/lvm.conf",       state: present }
    - { regexp: "host_id = {{ host_id }}",   line: "# host_id = 0",        dest: "/etc/lvm/lvmlocal.conf",  state: present }
- debug: msg={{ disable_lvm_cluster_lock }}
  when: print_debug == true


- name: Remove VG
  shell: |
    vgremove {{ item.vg }}
  register: remove_vg
  ignore_errors: true
  with_items:
    - "{{ pools.lvm.cluster }}"
- debug: msg={{ clean_devices }}


- name: Uninstall Relevant Packages for Clustered-LVM Pools
  package:
    name: "{{ item }}"
    state: absent
  register: uninstall_relevant_pkgs
  ignore_errors: true
  with_items:
    - "lvm2-lockd"
    - "sanlock"
    - "parted"
- debug: msg={{ uninstall_relevant_pkgs }}


- name: Delete Remaining VG and DM Info
  file:
    path: "/dev/{{ item.vg }}"
    state: absent
  register: delete_remaining_vg
  ignore_errors: true
  with_items:
    - "{{ pools.lvm.cluster }}"
- debug: msg={{ delete_remaining_vg }}


- name: Restart Incus to Release Disks Holded
  systemd:
    name: "{{ item }}"
    state: restart
  register: restart_incus
  ignore_errors: true
  until: restart_incus is succeeded
  retries: 5
  delay: 10
  with_items:
    - incus
- debug: msg={{ restart_incus }}
  when: print_debug == true



