---
- name: Stop and Disable Incus Service
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: yes
    daemon-reload: yes
  register: stop_incus
  ignore_errors: true
  # until: stop_incus is succeeded
  # retries: 10
  # delay: 10
  with_items:
    - "incus"
- debug: msg={{ stop_incus }}
  when: print_debug
#    - "incus-startup"
#    - "incus-user.socket"
#    - "incus-user"
#    - "incus.socket"


- name: Uninstall Incus Software Packages
  package: name={{ item }} state=absent
  with_items:
    - incus-client
    - incus-agent
    - incus-tools
    - incus
  register: uninstall_incus_pkgs
  ignore_errors: true
- debug: msg={{ uninstall_incus_pkgs }}
  when: print_debug == true



- name: Delete Zabbly Repository Config and Key
  file:
    path: "{{ item }}"
    state: absent
  register: delete_zabbly_config
  ignore_errors: true
  with_items:
    - "/etc/apt/sources.list.d/zabbly-incus-{{ _incus.repo.zabbly.version }}.sources"
    - "/etc/apt/keyrings/zabbly.asc"
- debug: msg={{ delete_zabbly_config }}
  when: print_debug == true


- name: Delete Zabbly APT Key Directory
  file:
    path: "{{ item }}"
    state: absent
  register: delete_zabbly_apt_key_dir
  ignore_errors: true
  with_items:
    - "/etc/apt/keyrings"
- debug: msg={{ delete_zabbly_apt_key_dir }}
  when: print_debug == true


- name: Apply New Repository Changes
  systemd:
    daemon_reload: true


- name: Update Caches for APT Packages
  apt:
    update_cache: yes
    cache_valid_time: 86400   # One day
  register: update_apt_cache
  until: update_apt_cache is succeeded
  retries: 20
  delay: 20
  # upgrade: yes


- name: Purge Broken Packages
  package: name={{ item }} state=absent purge=true
  with_items:
    - incus-agent
    - incus
    - incus-base
  register: purge_broken_pkgs
  ignore_errors: true
- debug: msg={{ purge_broken_pkgs }}
  when: print_debug == true


- name: Reboot Required
  shell: ( /bin/sleep 5 ; /sbin/shutdown -r now "Ansible updates triggered" ) &
  async: 120
  poll: 0
  notify:
    - Waiting for Server to Come Back After Reboot

# rm -rf /var/lib/incus/storage-pools/

- meta: flush_handlers
